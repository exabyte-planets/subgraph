name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write  # required for PyPI Trusted Publisher (OIDC)

jobs:
  publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
